<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>جاري تحويلك بأمان... | Qrytube</title>
  
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Cairo & Inter Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800&family=Inter:wght@500;700&display=swap" rel="stylesheet">
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: 'Cairo', 'Inter', sans-serif;
    }
  </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col justify-between items-center p-6 selection:bg-red-500/30 selection:text-red-200">

  <!-- Ambient light -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[450px] h-[450px] bg-red-650/10 rounded-full blur-3xl opacity-60"></div>
  </div>

  <div></div> <!-- spacer -->

  <!-- Card -->
  <main class="w-full max-w-sm bg-slate-900/40 border border-slate-900 backdrop-blur-md p-8 rounded-3xl text-center space-y-6 relative z-10">
    
    <div class="flex flex-col items-center justify-center">
      <div class="relative w-24 h-24 flex items-center justify-center">
        <!-- Inner glowing target -->
        <span class="absolute p-4 text-white bg-gradient-to-tr from-red-600 to-rose-600 rounded-2xl shadow-xl shadow-red-500/30 z-10 animate-pulse">
          <i data-lucide="shield-check" class="w-8 h-8"></i>
        </span>
        <!-- Outer loading ring -->
        <div class="absolute inset-x-0 inset-y-0 rounded-full border-2 border-slate-800 border-t-red-600 animate-spin" style="animation-duration: 0.7s;"></div>
      </div>
    </div>

    <div class="space-y-2">
      <h2 class="text-xl font-extrabold text-white" id="loading_title">جاري التحويل بأمان...</h2>
      <p class="text-xs text-slate-400 leading-normal" id="loading_text">نقوم بالتحقق من سلامة كود التوجيه وتحليل الإحصائيات قبل نقلك للرابط وجهتك الرسمية.</p>
    </div>

    <!-- Powered by badges -->
    <div class="flex items-center justify-center gap-1.5 py-2 px-4 bg-slate-950/80 rounded-2xl border border-slate-905 max-w-[200px] mx-auto text-[10px] text-slate-400">
      <i data-lucide="lock" class="w-3.5 h-3.5 text-emerald-400"></i>
      <span>اتصال مشفر وآمن 100%</span>
    </div>

  </main>

  <!-- Legal Footer info -->
  <footer class="text-[10px] text-slate-600 relative z-10">
    لوحة التوجيه والامان الخاصة بـ Qrytube © 2026.
  </footer>

  <script>
    // Initialize Lucide Icons
    lucide.createIcons();

    // Supabase Credentials
    const SUPABASE_URL = 'https://nlqealsgziswublmbtkw.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5scWVhbHNnemlzd3VibG1idGt3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyMjA5NjksImV4cCI6MjA5Njc5Njk2OX0.3lmxYWRtBpp_PMPKSfftW3SHeDxmim-SfuGShwovCW4';
    
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // User Agent Analyser for device and browser category detection
    function getDeviceAndBrowser() {
      const ua = navigator.userAgent;
      let device_type = "Desktop";
      let browser = "Other";

      // Device detection
      if (/tablet|ipad|playbook|silk/i.test(ua)) {
        device_type = "Tablet";
      } else if (/mobile|iphone|ipod|android|blackberry|iemobile|opera mini/i.test(ua)) {
        device_type = "Mobile";
      }

      // Browser detection
      if (/chrome|crios/i.test(ua) && !/edge|edg/i.test(ua) && !/opr|opera/i.test(ua)) {
        browser = "Chrome";
      } else if (/safari/i.test(ua) && !/chrome|crios/i.test(ua) && !/edge|edg/i.test(ua)) {
        browser = "Safari";
      } else if (/firefox|fxios/i.test(ua)) {
        browser = "Firefox";
      } else if (/edge|edg/i.test(ua)) {
        browser = "Edge";
      } else if (/opr|opera/i.test(ua)) {
        browser = "Opera";
      } else if (ua.indexOf("MSIE ") > -1 || !!ua.match(/Trident.*rv\:11\./)) {
        browser = "Internet Explorer";
      }

      return { device_type, browser };
    }

    // Process redirect action
    async function startRedirection() {
      const parent_title = document.getElementById('loading_title');
      const parent_text = document.getElementById('loading_text');

      try {
        const urlParams = new URLSearchParams(window.location.search);
        const codeId = urlParams.get('id');

        if (!codeId || codeId.trim() === "") {
          parent_title.innerText = "خطأ في التوجيه";
          parent_title.className = "text-xl font-extrabold text-red-500";
          parent_text.innerText = "رمز كود الـ QR مفقود أو غير مرسّخ في الرابط الحالي، يرجى التأكد من الرمز وإعادة المحاولة.";
          return;
        }

        // 1. Fetch campaigns details
        const { data: qrcodeData, error: qrErr } = await _supabase
          .from('qr_codes')
          .select('original_url')
          .eq('id', codeId)
          .single();

        if (qrErr || !qrcodeData) {
          console.error("Supabase select error:", qrErr);
          parent_title.innerText = "كود غير صالح ⚠️";
          parent_title.className = "text-xl font-extrabold text-red-500";
          parent_text.innerText = "الملف أو الكود المطلوب لم يعد موجوداً في قاعدة بيانات منصة Qrytube أو تم مسحه بواسطة مالكه.";
          return;
        }

        const destination = qrcodeData.original_url;
        const { device_type, browser } = getDeviceAndBrowser();

        // 2. Insert scan session with a racing timeout to ensure superfast routing
        try {
          await Promise.race([
            _supabase.from('qr_scans').insert({
              qr_id: codeId,
              device_type: device_type,
              browser: browser
            }),
            new Promise(resolve => setTimeout(resolve, 600)) // Max wait of 600ms before redirecting
          ]);
        } catch (e) {
          console.error("Scanning stats logging failed", e);
        }

        // 3. Fire redirect action
        window.location.replace(destination);

      } catch (err) {
        parent_title.innerText = "حدث خطأ طارئ";
        parent_title.className = "text-xl font-extrabold text-red-500";
        parent_text.innerText = err.message || "حدث خطأ غير متوقع أثناء المعالجة، الرجاء التحقق من جودة اتصالك بالإنترنت.";
      }
    }

    // Trigger redirection on load
    startRedirection();
  </script>
</body>
</html>
